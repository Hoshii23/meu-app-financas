<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Finanças Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --bg2: #1a1d27; --bg3: #222537;
            --card: #1e2133; --accent: #6c63ff; --accent2: #00d4aa;
            --danger: #ff5c5c; --text: #f0f0f5; --muted: #8888aa;
            --border: rgba(255,255,255,0.07); --radius: 16px;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            max-width: 420px; margin: 0 auto; padding-bottom: 80px;
        }
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .balance-card {
            background: linear-gradient(135deg, var(--accent), #8e87ff);
            padding: 24px; border-radius: 24px; margin-bottom: 20px;
        }
        .trans-item {
            background: var(--card); padding: 15px; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        nav {
            position: fixed; bottom: 0; width: 100%; max-width: 420px;
            background: var(--bg2); display: flex; padding: 15px 0;
            border-top: 1px solid var(--border);
        }
        .nav-item { flex: 1; text-align: center; background: none; border: none; color: var(--muted); cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .fab {
            position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px;
            border-radius: 50%; background: var(--accent); color: white;
            border: none; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg2); padding: 25px; border-radius: 24px; width: 90%; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: var(--bg3); color: white; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="home" class="screen active">
        <div class="balance-card">
            <p>Saldo Atual</p>
            <h1 id="main-balance">R$ 0,00</h1>
        </div>
        <h3>Transações</h3>
        <div id="trans-list"></div>
    </div>

    <div id="invest" class="screen">
        <h2>Investimentos</h2>
        <div id="invest-list"></div>
    </div>

    <nav>
        <button class="nav-item active" onclick="switchTab('home')">Início</button>
        <button class="nav-item" onclick="switchTab('invest')">Investir</button>
        <button class="nav-item" onclick="clearAll()">Resetar</button>
    </nav>

    <button class="fab" onclick="toggleModal()">+</button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Nova Transação</h2>
            <input type="text" id="t-name" placeholder="Descrição">
            <input type="number" id="t-val" placeholder="Valor">
            <select id="t-type">
                <option value="in">Entrada</option>
                <option value="out">Saída</option>
            </select>
            <button onclick="addTransaction()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px;">Salvar</button>
            <button onclick="toggleModal()" style="width:100%; margin-top:10px; background:none; color:var(--muted); border:none;">Cancelar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
